services:
  # ====================================================================================================================
  # POSTGRES SERVER
  # ====================================================================================================================
  pg-docker:
    image: postgres:14-alpine
    container_name: sta-postgresql
    environment:
      POSTGRES_DB: saraweb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234567
    ports:
      - 5432:5432
    volumes:
      - db_saraweb:/var/lib/postgresql/data
    networks:
      - sta-network

  # ====================================================================================================================
  # PGADMIN
  # ====================================================================================================================
  pgadmin-docker:
    image: dpage/pgadmin4
    container_name: sta-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: me@example.com
      PGADMIN_DEFAULT_PASSWORD: 1234567
    ports:
      - 5050:80
    volumes:
      - pgadmin-docker:/var/lib/pgadmin
    networks:
      - sta-network

  # ====================================================================================================================
  # SARAWEB API
  # ====================================================================================================================
  app:
    build: .
    container_name: sta-saraweb-api
    ports:
      - 8080:8080
    environment:
      APP_PROFILE: sta
      DB_HOST: pg-docker
      DB_PORT: 5432
      DB_DATABASE: saraweb
      DB_USERNAME: postgres
      DB_PASSWORD: 1234567
    depends_on:
      - pg-docker
    networks:
      - sta-network

# ====================================================================================================================
# VOLUMES
# ====================================================================================================================
volumes:
  db_saraweb:
  pgadmin-docker:

# ======================================================================================================================
# REDE
# ======================================================================================================================
networks:
  sta-network:
    driver: bridge
